version: '3.8'

services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Step 1: Separate service for collectstatic
  collectstatic:
    build: .
    command: python manage.py collectstatic --noinput
    env_file:
      - .env
    volumes:
      - static_volume:/var/www/html/static
    depends_on:
      - db

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/var/www/html/static
      - media_volume:/var/www/html/media
    depends_on:
      - db
    restart: always
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             uvicorn rcs.asgi:application --host 0.0.0.0 --port 8000 --workers 4"

  nginx:
    build: ./nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./webroot:/var/www/html
      - ./certbot/www:/var/www/certbot   
      - static_volume:/var/www/html/static
    depends_on:
      - web
    command: /bin/sh -c "while :; do sleep 12h; nginx -s reload; done & nginx -g 'daemon off;'"

  celery:
    build: .
    restart: always
    command: celery -A rcs worker --loglevel=info
    env_file:
      - .env
    volumes:
      - static_volume:/var/www/html/static
      - media_volume:/var/www/html/media
    depends_on:
      - db
      - web

  celery-beat:
    build: .
    restart: always
    command: celery -A rcs beat --loglevel=info
    env_file:
      - .env
    volumes:
      - static_volume:/var/www/html/static
      - media_volume:/var/www/html/media
    depends_on:
      - db
      - web

  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./webroot:/var/www/html
      - ./certbot/www:/var/www/certbot
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c"
    command: >
      "
      if ! certbot certificates | grep -q 'VALID:'; then
        echo 'No valid Let is Encrypt cert found. Generating a new one...';
        rm -rf /etc/letsencrypt/archive /etc/letsencrypt/renewal /etc/letsencrypt/accounts /etc/letsencrypt/live/api.level-4u.com;
        certbot certonly --webroot -w /var/www/certbot -d api.level-4u.com --register-unsafely-without-email --agree-tos --non-interactive;
      fi;
      echo 'Entering renewal loop...';
      trap exit TERM;
      while :; do
        sleep 12h & wait $${!};
        certbot renew --webroot -w /var/www/certbot --quiet;
      done
      "

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data: